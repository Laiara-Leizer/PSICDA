<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Correspondência de Formas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/game04.css">
</head>
<body>




    <div class="container text-center my-5">
        <h1>Jogo de Correspondência de Formas</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="row my-4">
            <div class="col-md-4">
                <input type="text" class="form-control" id="inputRetangulo" placeholder="Digite o nome da forma">
            </div>
            <div class="col-md-4">
                <input type="text" class="form-control" id="inputTriangulo" placeholder="Digite o nome da forma">
            </div>
            <div class="col-md-4">
                <input type="text" class="form-control" id="inputCirculo" placeholder="Digite o nome da forma">
            </div>
        </div>

        <button id="checkBtn" class="btn btn-success my-3">Verificar</button>
        <button id="resetBtn" class="btn btn-primary">Resetar Jogo</button>
    </div>

    <!-- Modal de Parabéns -->
    <div class="modal fade" id="parabensModal" tabindex="-1" aria-labelledby="parabensModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="parabensModalLabel">Parabéns!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Você acertou e ganhou uma moeda!</p>
                    <p>Moedas totais: <span id="totalCoins">0</span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script04.js"></script>
</body>
</html>
