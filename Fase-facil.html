<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - Difícil</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('img/Desktop - 1 (1).png');
            background-size: cover;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 20px 0;
        }

        .title {
            font-size: 2.5em;
            color: #9880C1;
        }

        .subtitle {
            font-size: 1.2em;
            color: #333;
        }

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            margin-top: 1vw;
            padding: 0;
}

        .card {
            width: 80px;
            height: 80px;
            position: relative;
            transform: scale(1);
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card .frente, .card .tras {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .frente {
            background-color: #efefef;
            color: #000000;
            transform: rotateY(180deg);
            border: 2px solid #cccccc;
        }

        .tras {
            background-color: #9880C1;
            color: #ffffff;
        }

        .headera {
            position: fixed;
            bottom: 20px;
            left: 20px;
        }

        .jogotopp {
            text-decoration: none;
            color: #000;
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        .jogo-da-memoria {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-gap: 10px;
        }




    </style>
</head>
<body>
    <header>
        <h2 class="subtitle">Pontos: <span id="score">00</span></h2>
        <h1 class="title">Jogo da Memória</h1>
        <h2 class="subtitle">Dificuldade: Facil</h2>
    </header>

    <main class="main">
        <section class="jogo-da-memoria" style="-webkit-user-select: none;">
            <!-- Cards will be dynamically inserted here -->
        </section>
    </main>

    <div class="headera">
        <a class="jogotopp" href="./index.html">VOLTAR</a>
    </div>

    <script>
        const gameContainer = document.querySelector('.jogo-da-memoria');
        const scoreElement = document.getElementById('score');
        let score = 0;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;

        // const characters = ['A'];


        const characters = ['A', 'B', 'C', 'D', 'E', 'F'];

        // 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N', 'O'

        const gameCards = [...characters, ...characters];

        function createCard(character) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.framework = character;

            const frente = document.createElement('div');
            frente.classList.add('frente');
            frente.textContent = character;

            const tras = document.createElement('div');
            tras.classList.add('tras');
            tras.textContent = '?';

            card.appendChild(frente);
            card.appendChild(tras);

            card.addEventListener('click', flipCard);

            return card;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initializeGame() {
            shuffleArray(gameCards);
            gameCards.forEach(character => {
                const card = createCard(character);
                gameContainer.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            score++;
            scoreElement.textContent = score.toString().padStart(2, '0');
            matchedPairs++;

            if (matchedPairs === characters.length) {
                setTimeout(() => {
                    showFinalScore();
                }, 1000);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');

                resetBoard();
            }, 1500);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showFinalScore() {
            const totalScore = parseInt(localStorage.getItem('totalScore') || 0) + score;
            localStorage.setItem('totalScore', totalScore);
            // window.location.href = 'fase-prox-m.html';
            window.location.href = 'fase-prox-m.html';
        }

        initializeGame();
    </script>
</body>
</html>
