<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontuação Final</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('img/Desktop - 1 (1).png');
            background-size: cover;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .score-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #9880C1;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #7a62a3;
            margin-bottom: 1.5rem;
        }

        .play-again-btn {
            display: inline-block;
            background-color: #9880C1;
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
        }

        .play-again-btn:hover {
            background-color: #7a62a3;
        }

        .play-again-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="score-container">
        <h1>Parabéns!</h1>
        <p>Você completou esta fase do Jogo da Memória!</p>
        <div class="score">
            Cupcakes totais: <span id="total-score">0</span>
        </div>
        <a href="./index.html" class="play-again-btn">Voltar a tela inicial</a>
        <a href="./Fase-media.html" class="play-again-btn">Jogar Novamente?</a>
        <a href="./Fase-dificil.html" class="play-again-btn">Próxima fase</a>
        
    </div>



    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const totalScore = localStorage.getItem('totalScore') || 0;
            document.getElementById('total-score').textContent = totalScore;

            // Clear the scores from localStorage
            localStorage.removeItem('mediumScore');
            // localStorage.removeItem('totalScore');


            




        });
    </script>
</body>
</html>
