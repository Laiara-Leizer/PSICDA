<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabéns!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container text-center my-5">
        <h1>Parabéns! Você Ganhou!</h1>
        <p class="lead">Você ganhou <span id="coinsEarned"></span> moeda(s)!</p>
        <button id="goBackBtn" class="btn btn-success">Voltar ao Jogo</button>
    </div>
    <script>
        // Exibe a quantidade de moedas ganhas
        const coinsEarned = localStorage.getItem('coins') || 0;
        document.getElementById('coinsEarned').textContent = coinsEarned;

        // Botão para voltar ao jogo
        document.getElementById('goBackBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
